name: Test Jackrong Qwopus3.5 quantized MLX

on:
  push:
    branches:
      - chatgpt-new-branch
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-qwopus-mlx:
    runs-on: macos-26
    timeout-minutes: 90
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade mlx mlx-lm huggingface_hub

      - name: Test quantized Jackrong Qwopus3.5 with MLX
        run: |
          set +e
          cat > test_jackrong_qwopus35_quant_mlx.py <<'PY'
          import inspect
          import json
          import os
          import platform
          import signal
          import subprocess
          import time
          import traceback
          from pathlib import Path

          from huggingface_hub import HfApi

          MODEL_ID = 'Jackrong/MLX-Qwopus3.5-9B-v3-4bit'
          ORIGINAL_MODEL_ID = 'Jackrong/Qwopus3.5-4B-v3'
          RESULT_MD = Path('jackrong-qwopus35-quant-mlx-test-results.md')
          RESULT_JSON = Path('jackrong-qwopus35-quant-mlx-test-results.json')
          LOG = Path('jackrong-qwopus35-quant-mlx-test.log')

          def log(msg):
              text = str(msg)
              print(text, flush=True)
              with LOG.open('a', encoding='utf-8') as f:
                  f.write(text + '\n')

          def cmd(args):
              try:
                  return subprocess.check_output(args, text=True, stderr=subprocess.STDOUT).strip()
              except Exception as exc:
                  return f'unavailable: {exc}'

          def file_summary(info):
              rows = []
              total = 0
              for s in getattr(info, 'siblings', []) or []:
                  name = getattr(s, 'rfilename', '') or ''
                  size = getattr(s, 'size', None) or 0
                  if name.endswith(('.safetensors', '.bin', '.npz', '.gguf')) or 'model' in name.lower() or name in {'config.json', 'tokenizer.json'}:
                      rows.append({'name': name, 'size': int(size or 0)})
                      total += int(size or 0)
              rows.sort(key=lambda r: r['name'])
              return total, rows

          def save_result(result, status=None):
              if status:
                  result['status'] = status
              result['updated_at'] = time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime())
              RESULT_JSON.write_text(json.dumps(result, indent=2) + '\n', encoding='utf-8')
              lines = [
                  '# Jackrong Qwopus3.5 quantized MLX test results',
                  '',
                  f"Status: `{result.get('status')}`",
                  f"Quantized MLX model: `{MODEL_ID}`",
                  f"Original failed BF16/F32 model attempted earlier: `{ORIGINAL_MODEL_ID}`",
                  f"Model URL: <https://huggingface.co/{MODEL_ID}>",
                  f"Started: `{result.get('started_at')}`",
                  f"Updated: `{result.get('updated_at')}`",
                  f"Runner: `{result.get('runner')} {result.get('runner_os')} {result.get('runner_arch')}`",
                  f"Platform: `{result.get('platform')}`",
                  f"GitHub SHA: `{result.get('github_sha')}`",
                  '',
              ]
              if result.get('huggingface'):
                  hf = result['huggingface']
                  lines += [
                      '## Hugging Face metadata',
                      f"Model ID: `{hf.get('model_id')}`",
                      f"Revision SHA: `{hf.get('sha')}`",
                      f"Library: `{hf.get('library_name')}`",
                      f"Pipeline: `{hf.get('pipeline_tag')}`",
                      f"Tags: `{hf.get('tags')}`",
                      f"Approx selected file bytes: `{hf.get('model_file_bytes_selected')}`",
                      '',
                  ]
              if result.get('load_seconds') is not None:
                  lines += [
                      '## MLX load',
                      f"Load seconds: `{result.get('load_seconds')}`",
                      f"Device before load: `{result.get('mlx_default_device_before_load')}`",
                      f"Device after load: `{result.get('mlx_default_device_after_load')}`",
                      '',
                  ]
              if result.get('tests'):
                  lines += ['## Generation tests', '| Test | OK | Max tokens | Seconds | Requested tok/s | Output tokens |', '|---|---:|---:|---:|---:|---:|']
                  for t in result['tests']:
                      lines.append(f"| {t['name']} | {t['ok']} | {t['max_tokens']} | {t['elapsed_seconds']} | {t['requested_tokens_per_second']} | {t['output_tokens_encoded']} |")
                  lines.append('')
                  for t in result['tests']:
                      lines += [f"### {t['name']} output", '```text', t.get('output_preview', ''), '```', '']
              if result.get('error'):
                  lines += ['## Error', f"`{result['error']}`", '', '```text', result.get('traceback', ''), '```', '']
              lines += ['See JSON and log files for full details.']
              RESULT_MD.write_text('\n'.join(lines) + '\n', encoding='utf-8')

          class TimeoutErrorForSmokeTest(Exception):
              pass

          def alarm_handler(signum, frame):
              raise TimeoutErrorForSmokeTest('generation smoke test timed out')

          started = time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime())
          LOG.write_text('', encoding='utf-8')
          result = {
              'status': 'started',
              'model_id': MODEL_ID,
              'original_attempted_model_id': ORIGINAL_MODEL_ID,
              'model_url': 'https://huggingface.co/' + MODEL_ID,
              'started_at': started,
              'github_sha': os.environ.get('GITHUB_SHA'),
              'github_run_id': os.environ.get('GITHUB_RUN_ID'),
              'github_run_number': os.environ.get('GITHUB_RUN_NUMBER'),
              'runner': os.environ.get('RUNNER_NAME'),
              'runner_os': os.environ.get('RUNNER_OS'),
              'runner_arch': os.environ.get('RUNNER_ARCH'),
              'platform': platform.platform(),
              'macos_version': cmd(['sw_vers']),
          }
          save_result(result)

          try:
              log(f'Testing quantized MLX Hugging Face model: {MODEL_ID}')
              log(f'Original BF16/F32 model from failed run: {ORIGINAL_MODEL_ID}')
              log(f"GitHub SHA: {result['github_sha']}")
              log(f"Runner: {result['runner']} {result['runner_os']} {result['runner_arch']}")
              log('macOS: ' + result['macos_version'].replace('\n', ' | '))

              api = HfApi()
              info = api.model_info(MODEL_ID, files_metadata=True)
              total_size, files = file_summary(info)
              result['huggingface'] = {
                  'model_id': info.modelId,
                  'sha': getattr(info, 'sha', None),
                  'private': getattr(info, 'private', None),
                  'tags': getattr(info, 'tags', []) or [],
                  'pipeline_tag': getattr(info, 'pipeline_tag', None),
                  'library_name': getattr(info, 'library_name', None),
                  'model_file_bytes_selected': total_size,
                  'files': files[:80],
              }
              log(f'Hugging Face metadata loaded: model_id={info.modelId}')
              log(f"Tags: {result['huggingface']['tags']}")
              log(f'Approx selected model/config/tokenizer bytes: {total_size}')
              save_result(result, 'metadata_loaded')

              import mlx.core as mx
              from mlx_lm import generate, load

              result['mlx_default_device_before_load'] = str(mx.default_device())
              log(f"MLX default device before load: {result['mlx_default_device_before_load']}")
              load_kwargs = {}
              try:
                  sig = inspect.signature(load)
                  if 'tokenizer_config' in sig.parameters:
                      load_kwargs['tokenizer_config'] = {'fix_mistral_regex': True}
                      log('Using tokenizer_config={fix_mistral_regex: True}')
              except Exception as exc:
                  log(f'Could not inspect mlx_lm.load signature: {exc}')

              load_start = time.perf_counter()
              model, tokenizer = load(MODEL_ID, **load_kwargs)
              mx.eval(model.parameters())
              load_seconds = time.perf_counter() - load_start
              result['load_seconds'] = round(load_seconds, 4)
              result['mlx_default_device_after_load'] = str(mx.default_device())
              log(f'Loaded model in {load_seconds:.4f}s on {mx.default_device()}')
              save_result(result, 'loaded')

              signal.signal(signal.SIGALRM, alarm_handler)
              tests = []
              for name, prompt, max_tokens, timeout_s in [
                  ('one_token_smoke', 'Hi.', 1, 45),
                  ('short_smoke', 'Say OK in one sentence.', 8, 60),
              ]:
                  test = {'name': name, 'prompt': prompt, 'max_tokens': max_tokens, 'status': 'started'}
                  result['tests'] = tests + [test]
                  save_result(result, f'{name}_started')
                  try:
                      signal.alarm(timeout_s)
                      t0 = time.perf_counter()
                      output = generate(model, tokenizer, prompt=prompt, max_tokens=max_tokens, verbose=False)
                      elapsed = time.perf_counter() - t0
                      signal.alarm(0)
                      try:
                          out_tokens = len(tokenizer.encode(output))
                      except Exception:
                          out_tokens = None
                      test.update({
                          'status': 'passed',
                          'ok': bool(output and str(output).strip()),
                          'elapsed_seconds': round(elapsed, 4),
                          'requested_tokens_per_second': round(max_tokens / elapsed, 4) if elapsed > 0 else None,
                          'output_tokens_encoded': out_tokens,
                          'output_preview': str(output)[:800],
                      })
                      log(f"{name}: passed seconds={elapsed:.4f} requested_tps={test['requested_tokens_per_second']} output={str(output)[:160]}")
                  except Exception as exc:
                      signal.alarm(0)
                      test.update({'status': 'error', 'ok': False, 'error': repr(exc), 'traceback': traceback.format_exc()})
                      log(f'{name}: failed {repr(exc)}')
                      log(traceback.format_exc())
                  tests.append(test)
                  result['tests'] = tests
                  save_result(result)

              result['status'] = 'passed' if all(t.get('ok') for t in tests) else 'partial_or_failed'
              save_result(result)

          except Exception as exc:
              result['status'] = 'error'
              result['error'] = repr(exc)
              result['traceback'] = traceback.format_exc()
              log('ERROR: ' + repr(exc))
              log(result['traceback'])
              save_result(result)
          finally:
              result['finished_at'] = time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime())
              save_result(result)
              log('Wrote result files')
          PY
          PYTHONUNBUFFERED=1 python test_jackrong_qwopus35_quant_mlx.py
          echo "python_exit=$?" | tee -a jackrong-qwopus35-quant-mlx-test.log
          exit 0

      - name: Commit test results back to branch
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add jackrong-qwopus35-quant-mlx-test-results.md jackrong-qwopus35-quant-mlx-test-results.json jackrong-qwopus35-quant-mlx-test.log || true
          git commit -m "Write quantized Jackrong Qwopus3.5 MLX test results [skip ci]" || echo "No result changes to commit"
          git pull --rebase || true
          git push || echo "No result push performed"
