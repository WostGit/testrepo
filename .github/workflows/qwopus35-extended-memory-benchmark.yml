name: Extended Qwopus3.5 9B 4bit MLX benchmark

on:
  push:
    branches:
      - chatgpt-new-branch
  workflow_dispatch:

permissions:
  contents: write

jobs:
  extended-qwopus-mlx:
    runs-on: macos-26
    timeout-minutes: 120
    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install --upgrade mlx mlx-lm huggingface_hub psutil pandas

      - name: Run extended benchmark with memory telemetry
        run: |
          set +e
          cat > extended_qwopus35_mlx_benchmark.py <<'PY'
          import csv
          import inspect
          import json
          import os
          import platform
          import resource
          import signal
          import statistics
          import subprocess
          import sys
          import threading
          import time
          import traceback
          from pathlib import Path

          import psutil
          from huggingface_hub import HfApi

          MODEL_ID = 'Jackrong/MLX-Qwopus3.5-9B-v3-4bit'
          RESULT_MD = Path('qwopus35-9b-4bit-mlx-extended-results.md')
          RESULT_JSON = Path('qwopus35-9b-4bit-mlx-extended-results.json')
          RESULT_CSV = Path('qwopus35-9b-4bit-mlx-extended-results.csv')
          LOG = Path('qwopus35-9b-4bit-mlx-extended.log')
          SAMPLES_JSONL = Path('qwopus35-9b-4bit-mlx-extended-memory-samples.jsonl')

          process = psutil.Process(os.getpid())
          samples = []
          monitor_stop = threading.Event()
          START_MONO = time.perf_counter()

          def sh(args):
              try:
                  return subprocess.check_output(args, text=True, stderr=subprocess.STDOUT).strip()
              except Exception as exc:
                  return f'unavailable: {exc}'

          def log(msg):
              text = str(msg)
              print(text, flush=True)
              with LOG.open('a', encoding='utf-8') as f:
                  f.write(text + '\n')

          def collect_memory(label):
              try:
                  mi = process.memory_info()
                  vm = psutil.virtual_memory()._asdict()
                  sw = psutil.swap_memory()._asdict()
                  ru = resource.getrusage(resource.RUSAGE_SELF)
                  sample = {
                      't': time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()),
                      'elapsed_s': round(time.perf_counter() - START_MONO, 4),
                      'label': label,
                      'rss_gib': round(mi.rss / (1024**3), 4),
                      'vms_gib': round(mi.vms / (1024**3), 4),
                      'ru_maxrss': ru.ru_maxrss,
                      'threads': process.num_threads(),
                      'system_total_gib': round(vm['total']/(1024**3), 4),
                      'system_available_gib': round(vm['available']/(1024**3), 4),
                      'system_used_gib': round(vm['used']/(1024**3), 4),
                      'system_percent': vm['percent'],
                      'swap_total_gib': round(sw['total']/(1024**3), 4),
                      'swap_used_gib': round(sw['used']/(1024**3), 4),
                      'swap_percent': sw['percent'],
                  }
                  samples.append(sample)
                  with SAMPLES_JSONL.open('a', encoding='utf-8') as f:
                      f.write(json.dumps(sample) + '\n')
                  log('MEM ' + ' '.join(f'{k}={v}' for k, v in sample.items() if k != 't'))
                  return sample
              except Exception as exc:
                  log(f'MEM_ERROR label={label} error={exc!r}')
                  return None

          def monitor_loop():
              while not monitor_stop.is_set():
                  collect_memory('background_2s')
                  monitor_stop.wait(2)

          def summarize_memory(prefix):
              if not samples:
                  return {}
              peak_rss = max(samples, key=lambda s: s['rss_gib'])
              min_avail = min(samples, key=lambda s: s['system_available_gib'])
              peak_swap = max(samples, key=lambda s: s['swap_used_gib'])
              return {
                  f'{prefix}_peak_rss_gib': peak_rss['rss_gib'],
                  f'{prefix}_peak_rss_label': peak_rss['label'],
                  f'{prefix}_min_available_gib': min_avail['system_available_gib'],
                  f'{prefix}_min_available_label': min_avail['label'],
                  f'{prefix}_peak_swap_gib': peak_swap['swap_used_gib'],
                  f'{prefix}_peak_swap_label': peak_swap['label'],
              }

          def save_outputs(result):
              result['updated_at'] = time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime())
              result['memory_sample_count'] = len(samples)
              result.update(summarize_memory('overall'))
              RESULT_JSON.write_text(json.dumps(result, indent=2) + '\n', encoding='utf-8')

              rows = result.get('cases', [])
              with RESULT_CSV.open('w', encoding='utf-8', newline='') as f:
                  fieldnames = ['name','prompt_label','prompt_tokens','max_tokens','repeat','status','elapsed_seconds','requested_tps','output_tokens','error','output_preview']
                  writer = csv.DictWriter(f, fieldnames=fieldnames)
                  writer.writeheader()
                  for row in rows:
                      writer.writerow({k: row.get(k, '') for k in fieldnames})

              lines = [
                  '# Extended Qwopus3.5 9B 4-bit MLX benchmark',
                  '',
                  f"Status: `{result.get('status')}`",
                  f"Model: `{MODEL_ID}`",
                  f"Started: `{result.get('started_at')}`",
                  f"Updated: `{result.get('updated_at')}`",
                  f"Runner: `{result.get('runner')} {result.get('runner_os')} {result.get('runner_arch')}`",
                  f"Platform: `{result.get('platform')}`",
                  f"GitHub SHA: `{result.get('github_sha')}`",
                  f"Load seconds: `{result.get('load_seconds')}`",
                  f"Model bytes GiB: `{result.get('model_file_gib')}`",
                  f"Overall peak process RSS GiB: `{result.get('overall_peak_rss_gib')}` at `{result.get('overall_peak_rss_label')}`",
                  f"Overall min available GiB: `{result.get('overall_min_available_gib')}` at `{result.get('overall_min_available_label')}`",
                  f"Overall peak swap GiB: `{result.get('overall_peak_swap_gib')}` at `{result.get('overall_peak_swap_label')}`",
                  '',
                  '## Case summary',
                  '| Case | Prompt tokens | Max tokens | Repeat | Status | Seconds | Requested tok/s | Output tokens |',
                  '|---|---:|---:|---:|---|---:|---:|---:|',
              ]
              for c in rows:
                  lines.append(f"| {c.get('name')} | {c.get('prompt_tokens')} | {c.get('max_tokens')} | {c.get('repeat')} | {c.get('status')} | {c.get('elapsed_seconds')} | {c.get('requested_tps')} | {c.get('output_tokens')} |")
              passed = [c for c in rows if c.get('status') == 'passed' and c.get('requested_tps') is not None]
              if passed:
                  best = max(passed, key=lambda c: c['requested_tps'])
                  lines += ['', '## Best throughput case', '```json', json.dumps(best, indent=2), '```']
              if result.get('error'):
                  lines += ['', '## Error', '```text', str(result.get('error')), str(result.get('traceback','')), '```']
              lines += ['', '## Artifacts', '- `qwopus35-9b-4bit-mlx-extended-results.json`', '- `qwopus35-9b-4bit-mlx-extended-results.csv`', '- `qwopus35-9b-4bit-mlx-extended.log`', '- `qwopus35-9b-4bit-mlx-extended-memory-samples.jsonl`']
              RESULT_MD.write_text('\n'.join(lines) + '\n', encoding='utf-8')

          class CaseTimeout(Exception):
              pass

          def alarm_handler(signum, frame):
              raise CaseTimeout('case timed out')

          def encode_len(tokenizer, text):
              try:
                  return len(tokenizer.encode(text))
              except Exception:
                  return None

          LOG.write_text('', encoding='utf-8')
          SAMPLES_JSONL.write_text('', encoding='utf-8')
          result = {
              'status': 'started',
              'model_id': MODEL_ID,
              'started_at': time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime()),
              'github_sha': os.environ.get('GITHUB_SHA'),
              'github_run_id': os.environ.get('GITHUB_RUN_ID'),
              'github_run_number': os.environ.get('GITHUB_RUN_NUMBER'),
              'runner': os.environ.get('RUNNER_NAME'),
              'runner_os': os.environ.get('RUNNER_OS'),
              'runner_arch': os.environ.get('RUNNER_ARCH'),
              'platform': platform.platform(),
              'python_version': sys.version.replace('\n',' '),
              'macos_version': sh(['sw_vers']),
              'sysctl_hw': sh(['bash','-lc','sysctl -n hw.memsize hw.ncpu hw.optional.arm64 2>/dev/null || true']),
              'cases': [],
          }
          save_outputs(result)
          monitor = threading.Thread(target=monitor_loop, daemon=True)
          monitor.start()

          try:
              log(f'Extended benchmark for {MODEL_ID}')
              log('sysctl_hw: ' + str(result['sysctl_hw']).replace('\n', ' | '))
              collect_memory('initial')

              api = HfApi()
              info = api.model_info(MODEL_ID, files_metadata=True)
              model_bytes = 0
              for s in getattr(info, 'siblings', []) or []:
                  name = getattr(s, 'rfilename', '') or ''
                  size = getattr(s, 'size', None) or 0
                  if name.endswith(('.safetensors','.bin','.npz')) or 'model' in name.lower() or name in {'config.json','tokenizer.json'}:
                      model_bytes += int(size or 0)
              result['model_file_bytes'] = model_bytes
              result['model_file_gib'] = round(model_bytes/(1024**3), 4)
              result['hf_tags'] = getattr(info, 'tags', []) or []
              save_outputs(result)

              collect_memory('before_import_mlx')
              import mlx.core as mx
              from mlx_lm import load, generate
              collect_memory('after_import_mlx')

              load_kwargs = {}
              try:
                  sig = inspect.signature(load)
                  if 'tokenizer_config' in sig.parameters:
                      load_kwargs['tokenizer_config'] = {'fix_mistral_regex': True}
              except Exception:
                  pass

              collect_memory('before_load')
              t0 = time.perf_counter()
              model, tokenizer = load(MODEL_ID, **load_kwargs)
              collect_memory('after_load_before_eval')
              mx.eval(model.parameters())
              collect_memory('after_eval')
              result['load_seconds'] = round(time.perf_counter() - t0, 4)
              result['mlx_device'] = str(mx.default_device())
              result['status'] = 'loaded'
              save_outputs(result)

              prompts = {
                  'tiny': 'Hi.',
                  'short': 'Say OK and one brief reason this model is running.',
                  'medium': 'In one concise paragraph, explain whether a 5 GB quantized MLX model can run on a 7 GB GitHub Actions M1 runner.',
                  'long': 'You are evaluating memory pressure for local LLM inference. Discuss model weight size, KV cache, prompt length, generation length, swap usage, and why a small macOS runner might become slow. Keep it technical but concise.',
              }
              plan = [
                  ('warmup_1tok', 'tiny', 1, 1, 90),
                  ('tiny_2tok', 'tiny', 2, 2, 90),
                  ('short_8tok', 'short', 8, 2, 120),
                  ('short_16tok', 'short', 16, 1, 180),
                  ('short_32tok', 'short', 32, 1, 240),
                  ('medium_prefill_1tok', 'medium', 1, 1, 120),
                  ('medium_8tok', 'medium', 8, 1, 180),
                  ('long_prefill_1tok', 'long', 1, 1, 180),
              ]
              signal.signal(signal.SIGALRM, alarm_handler)
              for name, prompt_label, max_tokens, repeats, timeout_s in plan:
                  prompt = prompts[prompt_label]
                  prompt_tokens = encode_len(tokenizer, prompt)
                  for rep in range(1, repeats + 1):
                      case = {
                          'name': name,
                          'prompt_label': prompt_label,
                          'prompt_tokens': prompt_tokens,
                          'max_tokens': max_tokens,
                          'repeat': rep,
                          'status': 'started',
                      }
                      result['cases'].append(case)
                      save_outputs(result)
                      collect_memory(f'before_case_{name}_rep{rep}')
                      try:
                          signal.alarm(timeout_s)
                          c0 = time.perf_counter()
                          output = generate(model, tokenizer, prompt=prompt, max_tokens=max_tokens, verbose=False)
                          elapsed = time.perf_counter() - c0
                          signal.alarm(0)
                          collect_memory(f'after_case_{name}_rep{rep}')
                          case['status'] = 'passed'
                          case['elapsed_seconds'] = round(elapsed, 4)
                          case['requested_tps'] = round(max_tokens / elapsed, 4) if elapsed > 0 else None
                          case['output_tokens'] = encode_len(tokenizer, str(output))
                          case['output_preview'] = str(output)[:400]
                          log(f"CASE_PASS name={name} rep={rep} max_tokens={max_tokens} seconds={case['elapsed_seconds']} tps={case['requested_tps']} output={case['output_preview'][:120].replace(chr(10),' | ')}")
                      except BaseException as exc:
                          signal.alarm(0)
                          collect_memory(f'after_case_error_{name}_rep{rep}')
                          case['status'] = 'error'
                          case['error'] = repr(exc)
                          case['traceback'] = traceback.format_exc()
                          log(f'CASE_ERROR name={name} rep={rep} error={exc!r}')
                          # Continue with next case unless the process was interrupted by system shutdown.
                      save_outputs(result)

              passed = [c for c in result['cases'] if c.get('status') == 'passed']
              result['status'] = 'finished'
              result['passed_cases'] = len(passed)
              result['total_cases'] = len(result['cases'])
              if passed:
                  result['avg_requested_tps'] = round(statistics.mean([c['requested_tps'] for c in passed if c.get('requested_tps') is not None]), 4)
                  result['best_requested_tps'] = max([c['requested_tps'] for c in passed if c.get('requested_tps') is not None])
              collect_memory('final')
              save_outputs(result)

          except BaseException as exc:
              result['status'] = 'error_or_interrupted'
              result['error'] = repr(exc)
              result['traceback'] = traceback.format_exc()
              log('TOP_LEVEL_ERROR ' + repr(exc))
              collect_memory('top_level_error')
              save_outputs(result)
          finally:
              monitor_stop.set()
              result['finished_at'] = time.strftime('%Y-%m-%dT%H:%M:%SZ', time.gmtime())
              collect_memory('finally')
              save_outputs(result)
              log('Wrote extended benchmark outputs')
          PY
          PYTHONUNBUFFERED=1 python extended_qwopus35_mlx_benchmark.py
          echo "python_exit=$?" | tee -a qwopus35-9b-4bit-mlx-extended.log
          exit 0

      - name: Commit extended benchmark results
        if: always()
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add qwopus35-9b-4bit-mlx-extended-results.md qwopus35-9b-4bit-mlx-extended-results.json qwopus35-9b-4bit-mlx-extended-results.csv qwopus35-9b-4bit-mlx-extended.log qwopus35-9b-4bit-mlx-extended-memory-samples.jsonl || true
          git commit -m "Write extended Qwopus3.5 9B 4bit MLX benchmark results [skip ci]" || echo "No extended benchmark result changes to commit"
          git pull --rebase || true
          git push || echo "No extended benchmark result push performed"
